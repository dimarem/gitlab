stages:
  - test

before_script:
  # установим curl и jq в случае отсутствия
  - command -v curl >/dev/null || apk add --no-cache curl
  - command -v jq >/dev/null || apk add --no-cache jq
  # сохраним авторизационный ключ
  - echo ${YC_CI_LOCKBOX_KEY} | base64 -d > /tmp/sa-key.json
  # установим утилиту `yc`
  - curl https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i /usr -n
  # создадим локальный профиль (существует только на время выполнения джобы)
  - yc config profile create sa-profile
  # привяжем ключ к профилю, чтобы могли действовать от имени сервисного аккаунта в облаке
  - yc config set service-account-key /tmp/sa-key.json 

getsecret:
  stage: test
  image: bash
  script:
    # Получаем секрет
    - export VALUE_OF_YC_CI_SECRET_ID=`yc lockbox payload get --id $YC_CI_SECRET_ID --jq '.entries[].text_value'`
    # Выводим его в консоль
    - echo $VALUE_OF_YC_CI_SECRET_ID
